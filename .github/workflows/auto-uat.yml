name: Auto UAT (6h)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  uat:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install chromium
      - name: Run autonomous UAT loop
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APP_URL: https://airtel-champions-app-web-git-main-christopherkiokos-projects.vercel.app/
        run: node scripts/auto-evolve.js
