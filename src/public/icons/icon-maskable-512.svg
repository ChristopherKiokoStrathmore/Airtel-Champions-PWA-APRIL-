<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    MASKABLE ICON — Safe zone is the inner 80% circle (radius 204px, centre 256,256).
    All meaningful content is within x:[52,460] y:[52,460].
    The full background bleeds to the edges for clean circular/squircle crops.
  -->

  <!-- Full-bleed black background -->
  <rect width="512" height="512" fill="#0A0A0A"/>

  <!-- Subtle red glow (stays within safe zone) -->
  <defs>
    <radialGradient id="gm" cx="50%" cy="46%" r="38%">
      <stop offset="0%" stop-color="#E60000" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#0A0A0A" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#gm)"/>

  <!-- Lightning bolt — kept inside safe zone (y: 90–390) -->
  <polygon
    points="284,90 192,268 252,268 218,390 322,238 260,238 297,90"
    fill="#E60000"
  />
  <polygon
    points="274,106 210,255 250,255 228,368 302,252 258,252 282,106"
    fill="#FF3333"
    opacity="0.35"
  />

  <!-- "AIRTEL" — y=418, within safe zone y<460 -->
  <text
    x="256" y="418"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    fill="#E60000"
    text-anchor="middle"
    letter-spacing="9"
  >AIRTEL</text>

  <!-- "CHAMPIONS" — y=456, within safe zone y<460 -->
  <text
    x="256" y="456"
    font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif"
    font-size="42"
    font-weight="900"
    fill="#FFFFFF"
    text-anchor="middle"
    letter-spacing="1.5"
  >CHAMPIONS</text>
</svg>
